<!DOCTYPE html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Kollektionserfassung V8</title><style>body{font-family:-apple-system,sans-serif;margin:0;background:#f4f5f7}header{background:#6AA84F;color:white;padding:16px;text-align:center;font-size:22px;font-weight:bold}.menu,.panel{padding:12px}.btn{display:block;width:100%;padding:16px;margin:8px 0;border:0;border-radius:10px;background:#6AA84F;color:white;font-size:16px}.card{background:white;padding:12px;border-radius:12px;margin-bottom:12px}input,select,textarea{width:100%;box-sizing:border-box;padding:10px;margin-top:6px}.hidden{display:none}</style></head><body><header>Kollektionserfassung V8</header><div class='card'>✅ JavaScript läuft</div><div class='menu'><button class='btn' onclick="show('erf')">➕ Neue Erfassung</button><button class='btn' onclick="show('kun')">👥 Kunden verwalten</button><button class='btn' onclick="show('kol')">📚 Kollektionen verwalten</button><button class='btn' onclick="show('exp')">📤 Export</button></div><div id='erf' class='panel'><div class='card'><input type='date' id='datum'><select id='kunde'></select><select id='kollektion'></select><input id='preis' placeholder='Preis'><textarea id='bem' placeholder='Bemerkung'></textarea><button class='btn' onclick='addEntry()'>Speichern</button></div><div class='card'><div id='liste'></div></div></div><div id='kun' class='panel hidden'><div class='card'><input id='newCustomer'><button class='btn' onclick='addCustomer()'>Kunde hinzufügen</button><div id='customerList'></div></div></div><div id='kol' class='panel hidden'><div class='card'><input id='newCollection'><button class='btn' onclick='addCollection()'>Kollektion hinzufügen</button><div id='collectionList'></div></div></div><div id='exp' class='panel hidden'><div class='card'><textarea id='csv' rows='12'></textarea><button class='btn' onclick='createCsv()'>CSV erzeugen</button></div></div><script>let customers=['Möbelhaus Müller','Wohnstudio Hansen','Möbel Kraft','Mömax','XXXLutz','Höffner'];let collections=['Modern Living','Premium Textile','Loft Collection','Nature Line'];let entries=[];datum.value=new Date().toISOString().split('T')[0];function show(id){document.querySelectorAll('.panel').forEach(x=>x.classList.add('hidden'));document.getElementById(id).classList.remove('hidden');}function refresh(){kunde.innerHTML=customers.map(x=>`<option>${x}</option>`).join('');kollektion.innerHTML=collections.map(x=>`<option>${x}</option>`).join('');customerList.innerHTML=customers.join('<br>');collectionList.innerHTML=collections.join('<br>');liste.innerHTML=entries.map(e=>`${e.datum} | ${e.kunde} | ${e.kollektion} | ${e.preis}<br>`).join('');}function addCustomer(){if(newCustomer.value){customers.push(newCustomer.value);refresh();}}function addCollection(){if(newCollection.value){collections.push(newCollection.value);refresh();}}function addEntry(){entries.push({datum:datum.value,kunde:kunde.value,kollektion:kollektion.value,preis:preis.value});refresh();}function createCsv(){csv.value=entries.map(e=>[e.datum,e.kunde,e.kollektion,e.preis].join(';')).join('
');}refresh();</script></body></html>
